name: CI/CD Pipeline VZeta

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Autenticación en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets::DOCKER_USERNAME }}
          password: ${{ secrets::DOCKER_PASSWORD }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configurar Cache de Docker
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Construir y Subir Imagen de la App
        uses: docker/build-push-action@v5
        with:
          context: ./myapp
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vzeta-app:latest

      - name: Construir y Subir Imagen de Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vzeta-nginx:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en Servidor EC2 mediante SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Crear red interna si no existe
            docker network create vzeta_net || true
            
            # Crear directorio para persistencia si no existe
            mkdir -p ~/nginx_logs

            # Detener y remover contenedores antiguos
            docker stop mynginx_container myapp_container || true
            docker rm mynginx_container myapp_container || true

            # Descargar últimas imágenes
            docker pull ${{ secrets.DOCKER_USERNAME }}/vzeta-app:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/vzeta-nginx:latest

            # 1. Desplegar Contenedor de la Aplicación
            docker run -d \
              --name myapp_container \
              --network vzeta_net \
              ${{ secrets.DOCKER_USERNAME }}/vzeta-app:latest

            # 2. Desplegar Contenedor Nginx (Proxy) con Bind Mount
            docker run -d \
              --name mynginx_container \
              -p 80:80 \
              --network vzeta_net \
              --mount type=bind,source=/home/ubuntu/nginx_logs,target=/var/log/nginx \
              ${{ secrets.DOCKER_USERNAME }}/vzeta-nginx:latest
